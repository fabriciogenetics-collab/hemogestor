<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HemoGestor</title>

<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#b30000">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

.topo{
background:#b30000;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
display:flex;
justify-content:space-between;
}

.topo button{
background:#d91c1c;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
}

.container{
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.indicador{
background:#fafafa;
padding:20px;
border-radius:10px;
border:1px solid #eee;
}

.indicador span{
display:block;
color:#666;
margin-bottom:10px;
}

.indicador strong{
font-size:28px;
color:#b30000;
}

.modulos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.modulo{
background:white;
padding:20px;
border-radius:10px;
text-decoration:none;
color:black;
border:2px solid #eee;
}

.modulo:hover{
border-color:#b30000;
}

</style>

</head>

<body>

<div class="topo">
HemoGestor
<button id="sair">Sair</button>
</div>

<div class="container">

<div class="card">

<h3>Resumo da Agência</h3>

<p><strong>Agência:</strong> <span id="agencia"></span></p>

<div class="grid">

<div class="indicador">
<span>Transfusões do mês</span>
<strong id="transfusoes">0</strong>
</div>

<div class="indicador">
<span>Reações registradas</span>
<strong id="reacoes">0</strong>
</div>

<div class="indicador">
<span>Taxa de reação</span>
<strong id="taxa">0%</strong>
</div>

<div class="indicador">
<span>Itens com estoque baixo</span>
<strong id="estoque">0</strong>
</div>

</div>

</div>

<div class="card">

<h3>Módulos</h3>

<div class="modulos">

<a class="modulo" href="transfusoes.html">
Registrar transfusão
</a>

<a class="modulo" href="reacoes.html">
Reações transfusionais
</a>

<a class="modulo" href="acompanhamento.html">
Acompanhamento transfusional
</a>

<a class="modulo" href="estoque.html">
Controle de estoque
</a>

<a class="modulo" href="indicadores.html">
Indicadores
</a>

<a class="modulo" href="relatorios.html">
Relatórios
</a>

</div>

</div>

</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabaseUrl="https://awtszrqsnsgncdrlzizy.supabase.co"
const supabaseKey="sb_publishable_z32nrrXomlRC-Ke4wVqZJA_o7FikqDb"

const supabase=createClient(supabaseUrl,supabaseKey)

let agenciaUsuario=""

async function carregarUsuario(){

const {data}=await supabase.auth.getSession()

const email=data.session.user.email

const {data:usuario}=await supabase
.from("usuarios")
.select("*")
.eq("email",email)
.single()

agenciaUsuario=usuario.agencia

document.getElementById("agencia").innerText=agenciaUsuario

}

async function carregarIndicadores(){

const {data:transfusoes}=await supabase
.from("transfusoes")
.select("*")
.eq("agencia",agenciaUsuario)

const {data:reacoes}=await supabase
.from("reacoes_transfusionais")
.select("*")
.eq("agencia",agenciaUsuario)

const {data:estoque}=await supabase
.from("estoque")
.select("*")
.eq("agencia",agenciaUsuario)

document.getElementById("transfusoes").innerText=transfusoes.length
document.getElementById("reacoes").innerText=reacoes.length

let taxa=0

if(transfusoes.length>0){

taxa=((reacoes.length/transfusoes.length)*100).toFixed(2)

}

document.getElementById("taxa").innerText=taxa+"%"

let mapa={}

estoque.forEach(m=>{

if(!mapa[m.item]) mapa[m.item]=0

if(m.tipo_movimento==="Entrada") mapa[m.item]+=Number(m.quantidade)
else mapa[m.item]-=Number(m.quantidade)

})

let baixo=0

Object.values(mapa).forEach(q=>{

if(q<=3) baixo++

})

document.getElementById("estoque").innerText=baixo

}

document.getElementById("sair").onclick=async()=>{

await supabase.auth.signOut()

window.location="/"

}

await carregarUsuario()

carregarIndicadores()

</script>

</body>

</html>

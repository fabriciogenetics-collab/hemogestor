<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatórios Hemoterápicos</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

.topo{
background:#b30000;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
display:flex;
justify-content:space-between;
}

.topo a{
color:white;
text-decoration:none;
background:#d91c1c;
padding:10px 15px;
border-radius:6px;
}

.container{
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
margin-bottom:30px;
}

button{
background:#c40000;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

h2{
margin-top:0;
}

</style>

</head>

<body>

<div class="topo">
Relatórios Hemoterápicos
<a href="dashboard.html">Voltar</a>
</div>

<div class="container">

<div class="card">

<h2>Relatório do Comitê Transfusional</h2>

<p><strong>Agência:</strong> <span id="agencia"></span></p>

<p><strong>Total de transfusões:</strong> <span id="transfusoes"></span></p>

<p><strong>Total de reações:</strong> <span id="reacoes"></span></p>

<p><strong>Taxa de reação:</strong> <span id="taxa"></span></p>

<p><strong>Hemocomponente mais utilizado:</strong> <span id="maisUsado"></span></p>

<h3>Análise automática</h3>

<p id="analise"></p>

<button onclick="window.print()">Imprimir / Salvar PDF</button>

</div>

</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabaseUrl="https://awtszrqsnsgncdrlzizy.supabase.co"
const supabaseKey="sb_publishable_z32nrrXomlRC-Ke4wVqZJA_o7FikqDb"

const supabase=createClient(supabaseUrl,supabaseKey)

let agenciaUsuario=""

async function carregarUsuario(){

const {data}=await supabase.auth.getSession()

const email=data.session.user.email

const {data:usuario}=await supabase
.from("usuarios")
.select("*")
.eq("email",email)
.single()

agenciaUsuario=usuario.agencia

document.getElementById("agencia").innerText=agenciaUsuario

}

async function gerarRelatorio(){

const {data:transfusoes}=await supabase
.from("transfusoes")
.select("*")
.eq("agencia",agenciaUsuario)

const {data:reacoes}=await supabase
.from("reacoes_transfusionais")
.select("*")
.eq("agencia",agenciaUsuario)

const totalTransfusoes=transfusoes.length
const totalReacoes=reacoes.length

let taxa=0

if(totalTransfusoes>0){

taxa=((totalReacoes/totalTransfusoes)*100).toFixed(2)

}

document.getElementById("transfusoes").innerText=totalTransfusoes
document.getElementById("reacoes").innerText=totalReacoes
document.getElementById("taxa").innerText=taxa+" %"

let contagem={}

transfusoes.forEach(t=>{

if(!contagem[t.hemocomponente]) contagem[t.hemocomponente]=0

contagem[t.hemocomponente]++

})

let maisUsado="-"
let maior=0

for(let item in contagem){

if(contagem[item]>maior){

maior=contagem[item]
maisUsado=item

}

}

document.getElementById("maisUsado").innerText=maisUsado

let analise=""

analise+="No período analisado foram registradas "+totalTransfusoes+" transfusões. "

analise+="Foram identificadas "+totalReacoes+" reações transfusionais. "

analise+="A taxa de reação foi de "+taxa+"%. "

if(taxa<3){

analise+="A taxa de reações permanece dentro dos parâmetros esperados para serviços hemoterápicos."

}

else{

analise+="A taxa de reações está acima do esperado e recomenda-se investigação."

}

document.getElementById("analise").innerText=analise

}

await carregarUsuario()

gerarRelatorio()

</script>

</body>

</html>

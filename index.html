<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>HemoGestor</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family: Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:350px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
color:#b30000;
margin-bottom:30px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:5px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#c40000;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#a00000;
}

#msg{
margin-top:15px;
color:#b30000;
}

</style>

</head>

<body>

<div class="login-box">

<h1>HemoGestor</h1>

<input id="email" placeholder="Email">

<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<div id="msg"></div>

</div>
  
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://awtszrqsnsngcdrlzizy.supabase.co"
const supabaseKey = "sb_publishable_z32nrrXomlRC-Ke4wVqZJA_o7FikqDb"

const client = window.supabase.createClient(supabaseUrl, supabaseKey)

async function login(){

let email = document.getElementById("email").value
let senha = document.getElementById("senha").value

const { data, error } = await client.auth.signInWithPassword({
email: email,
password: senha
})

if(error){
document.getElementById("msg").innerText = error.message
return
}

document.getElementById("msg").innerText = "Login realizado com sucesso"

}

</script>

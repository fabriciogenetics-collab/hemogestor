<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HemoGestor</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#8b0000,#ff3b3b);
}

.container{
display:flex;
width:950px;
max-width:95%;
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.lado-esquerdo{
flex:1;
background:#8b0000;
color:white;
padding:50px;
display:flex;
flex-direction:column;
justify-content:center;
}

.logo{
margin-bottom:30px;
}

.logo img{
width:260px;
}

.lado-esquerdo h1{
margin:0;
font-size:32px;
margin-bottom:10px;
}

.lado-esquerdo p{
font-size:15px;
line-height:1.6;
opacity:0.9;
}

.lado-direito{
flex:1;
padding:50px;
display:flex;
flex-direction:column;
justify-content:center;
}

.lado-direito h2{
margin-top:0;
margin-bottom:20px;
color:#8b0000;
}

input{
width:100%;
padding:12px;
margin-bottom:14px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#8b0000;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#650000;
}

.footer{
margin-top:20px;
font-size:12px;
color:#777;
text-align:center;
}

@media(max-width:750px){

.container{
flex-direction:column;
}

.lado-esquerdo{
text-align:center;
}

.logo img{
width:200px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="lado-esquerdo">

<div class="logo">
<img src="logo-gsh.png">
</div>

<h1>HemoGestor</h1>

<p>
Sistema de gestão hemoterápica para controle completo das atividades
transfusionais das agências.
</p>

<p>
Registre transfusões, monitore reações, acompanhe indicadores,
controle o estoque e garanta rastreabilidade e segurança transfusional.
</p>

</div>

<div class="lado-direito">

<h2>Acessar sistema</h2>

<input id="email" placeholder="Email">

<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<div class="footer">
HemoGestor • Sistema Hemoterápico
</div>

</div>

</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabaseUrl="https://awtszrqsnsgncdrlzizy.supabase.co"
const supabaseKey="SUA_CHAVE_PUBLICA_AQUI"

const supabase=createClient(supabaseUrl,supabaseKey)

window.login=async()=>{

const email=document.getElementById("email").value
const senha=document.getElementById("senha").value

const {error}=await supabase.auth.signInWithPassword({
email,
password:senha
})

if(error){

alert("Email ou senha inválidos")
return

}

const {data}=await supabase
.from("usuarios")
.select("*")
.eq("email",email)
.single()

if(data.primeiro_login){

window.location="trocar-senha.html"

}else{

window.location="dashboard.html"

}

}

</script>

</body>

</html>

<!DOCTYPE html>
<html>
<head>
<title>HemoGestor</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
color:#b30000;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#b30000;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h1>HemoGestor</h1>

<input placeholder="Email">

<input type="password" placeholder="Senha">

<button>Entrar</button>

</div>

</body>
</html>

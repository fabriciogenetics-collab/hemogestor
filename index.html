<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - HemoGestor</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:350px;
}

h2{
margin-top:0;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#b30000;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>HemoGestor</h2>

<input id="email" placeholder="Email">

<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabaseUrl="https://awtszrqsnsgncdrlzizy.supabase.co"
const supabaseKey="sb_publishable_z32nrrXomlRC-Ke4wVqZJA_o7FikqDb"

const supabase=createClient(supabaseUrl,supabaseKey)

window.login=async()=>{

const email=document.getElementById("email").value
const senha=document.getElementById("senha").value

const {error}=await supabase.auth.signInWithPassword({
email,
password:senha
})

if(error){

alert("Login inválido")
return

}

const {data}=await supabase
.from("usuarios")
.select("*")
.eq("email",email)
.single()

if(data.primeiro_login){

window.location="trocar-senha.html"

}else{

window.location="dashboard.html"

}

}

</script>

</body>

</html>

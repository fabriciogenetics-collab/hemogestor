<!DOCTYPE html>
<html>
<head>
<title>HemoGestor</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
color:#b30000;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#b30000;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<div class="card">

<h1>HemoGestor</h1>

<input id="email" placeholder="Email">

<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<p id="msg"></p>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://awtszrqsnsngcdrlzizy.supabase.co",
"sb_publishable_z32nrrXomlRC-Ke4wVqZJA_o7FikqDb"
)

async function login(){

let email = document.getElementById("email").value
let senha = document.getElementById("senha").value

const { data, error } = await supabaseClient.auth.signInWithPassword({
email: email,
password: senha
})

if(error){
document.getElementById("msg").innerText="Login inválido"
return
}

document.getElementById("msg").innerText="Login realizado com sucesso"

}

</script>

</body>
</html>

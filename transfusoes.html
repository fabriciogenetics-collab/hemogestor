<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registrar Transfusão</title>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabaseUrl = "https://awtszrqsnsgncdrlzizy.supabase.co"
const supabaseKey = "sb_publishable_z32nrrXomlRC-Ke4wVqZJA_o7FikqDb"

const supabase = createClient(supabaseUrl, supabaseKey)

window.salvar = async function(){

const paciente = document.getElementById("paciente").value
const prontuario = document.getElementById("prontuario").value
const leito = document.getElementById("leito").value
const data = document.getElementById("data").value
const hora = document.getElementById("hora").value
const hemocomponente = document.getElementById("hemocomponente").value
const numero_bolsa = document.getElementById("bolsa").value
const volume = document.getElementById("volume").value
const medico = document.getElementById("medico").value
const profissional = document.getElementById("profissional").value
const reacao = document.getElementById("reacao").value
const observacoes = document.getElementById("obs").value

const { data:resultado, error } = await supabase
.from("transfusoes")
.insert([
{
paciente,
prontuario,
leito,
data_transfusao:data,
hora_transfusao:hora,
hemocomponente,
numero_bolsa,
volume,
medico,
profissional,
reacao,
observacoes
}
])

if(error){

alert("Erro Supabase: " + error.message)

console.log(error)

}else{

alert("Transfusão registrada com sucesso")

}

}

</script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

.topo{
background:#b30000;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
}

.container{
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
max-width:800px;
}

input,select,textarea{

width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;

}

button{

background:#c40000;
color:white;
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
font-size:16px;

}

</style>

</head>

<body>

<div class="topo">

Registrar transfusão

</div>

<div class="container">

<div class="card">

<label>Paciente</label>
<input id="paciente">

<label>Prontuário</label>
<input id="prontuario">

<label>Leito</label>
<input id="leito">

<label>Data</label>
<input type="date" id="data">

<label>Hora</label>
<input type="time" id="hora">

<label>Hemocomponente</label>
<select id="hemocomponente">
<option>Concentrado de hemácias</option>
<option>Plaquetas</option>
<option>Plasma</option>
<option>Crioprecipitado</option>
</select>

<label>Número da bolsa</label>
<input id="bolsa">

<label>Volume</label>
<input id="volume">

<label>Médico solicitante</label>
<input id="medico">

<label>Profissional que instalou</label>
<input id="profissional">

<label>Reação transfusional</label>
<select id="reacao">
<option>Não</option>
<option>Sim</option>
</select>

<label>Observações</label>
<textarea id="obs"></textarea>

<button onclick="salvar()">Salvar transfusão</button>

</div>

</div>

</body>

</html>

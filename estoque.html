<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Estoque de Insumos</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

.topo{
background:#b30000;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
display:flex;
justify-content:space-between;
}

.topo a{
color:white;
text-decoration:none;
background:#d91c1c;
padding:10px 15px;
border-radius:6px;
}

.container{
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
margin-bottom:30px;
}

.alerta{
background:#fff3cd;
border:1px solid #ffeeba;
color:#856404;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.mini{
background:#fafafa;
border:1px solid #eee;
padding:15px;
border-radius:8px;
}

.mini strong{
display:block;
font-size:20px;
color:#b30000;
margin-top:5px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#c40000;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border-bottom:1px solid #ddd;
padding:10px;
text-align:left;
}

.info-agencia{
background:#eef6ff;
border:1px solid #cfe2ff;
padding:12px;
border-radius:8px;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="topo">
Estoque de Insumos
<a href="dashboard.html">Voltar</a>
</div>

<div class="container">

<div class="info-agencia">
Agência do usuário logado: <strong id="agenciaLogada">Carregando...</strong>
</div>

<div id="alertaEstoque"></div>

<div class="card">

<h3>Novo movimento</h3>

<label>Item</label>
<input id="item">

<label>Tipo</label>
<select id="tipo">
<option>Entrada</option>
<option>Saída</option>
<option>Descarte</option>
</select>

<label>Quantidade</label>
<input id="quantidade" type="number">

<label>Motivo</label>
<input id="motivo">

<label>Lote</label>
<input id="lote">

<label>Data</label>
<input id="data" type="date">

<button onclick="salvar()">Salvar</button>

</div>

<div class="card">

<h3>Estoque atual</h3>

<div class="grid" id="resumo"></div>

</div>

<div class="card">

<h3>Movimentos</h3>

<table>

<thead>
<tr>
<th>Data</th>
<th>Agência</th>
<th>Item</th>
<th>Tipo</th>
<th>Quantidade</th>
<th>Motivo</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabaseUrl="https://awtszrqsnsgncdrlzizy.supabase.co"
const supabaseKey="sb_publishable_z32nrrXomlRC-Ke4wVqZJA_o7FikqDb"

const supabase=createClient(supabaseUrl,supabaseKey)

let agenciaUsuario=""

async function carregarUsuario(){

const {data}=await supabase.auth.getSession()

const email=data.session.user.email

const {data:usuario}=await supabase
.from("usuarios")
.select("*")
.eq("email",email)
.single()

agenciaUsuario=usuario.agencia

document.getElementById("agenciaLogada").innerText=agenciaUsuario

}

async function salvar(){

const item=document.getElementById("item").value
const tipo=document.getElementById("tipo").value
const quantidade=document.getElementById("quantidade").value
const motivo=document.getElementById("motivo").value
const lote=document.getElementById("lote").value
const data=document.getElementById("data").value

await supabase
.from("estoque")
.insert([{
agencia:agenciaUsuario,
item,
tipo_movimento:tipo,
quantidade,
motivo,
lote,
data_movimento:data
}])

carregar()

}

async function carregar(){

const {data}=await supabase
.from("estoque")
.select("*")
.eq("agencia",agenciaUsuario)

const lista=document.getElementById("lista")
lista.innerHTML=""

let mapa={}

data.forEach(m=>{

lista.innerHTML+=`
<tr>
<td>${m.data_movimento}</td>
<td>${m.agencia}</td>
<td>${m.item}</td>
<td>${m.tipo_movimento}</td>
<td>${m.quantidade}</td>
<td>${m.motivo || ""}</td>
</tr>
`

if(!mapa[m.item]) mapa[m.item]=0

if(m.tipo_movimento==="Entrada") mapa[m.item]+=Number(m.quantidade)
else mapa[m.item]-=Number(m.quantidade)

})

const resumo=document.getElementById("resumo")
resumo.innerHTML=""

let alerta=""

Object.keys(mapa).forEach(item=>{

let qtd=mapa[item]

resumo.innerHTML+=`
<div class="mini">
${item}
<strong>${qtd}</strong>
</div>
`

if(qtd<=3){

alerta+=`${item} → estoque: ${qtd}<br>`

}

})

if(alerta){

document.getElementById("alertaEstoque").innerHTML=`
<div class="alerta">
⚠️ Itens com estoque baixo<br><br>
${alerta}
</div>
`

}else{

document.getElementById("alertaEstoque").innerHTML=""

}

}

await carregarUsuario()
carregar()

</script>

</body>
</html>

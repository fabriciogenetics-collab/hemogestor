<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reação Transfusional</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

.topo{
background:#b30000;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

.topo a{
color:white;
text-decoration:none;
background:#d91c1c;
padding:10px 15px;
border-radius:6px;
}

.container{
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
max-width:1150px;
margin-bottom:30px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box;
}

textarea{
min-height:100px;
}

button{
background:#c40000;
color:white;
border:none;
padding:12px 18px;
border-radius:6px;
cursor:pointer;
}

button.excluir{
background:#8b0000;
}

button.secundario{
background:#666;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border-bottom:1px solid #ddd;
padding:10px;
text-align:left;
font-size:14px;
}

th{
background:#fafafa;
}

.info-agencia{
background:#eef6ff;
color:#0b5394;
border:1px solid #cfe2ff;
padding:12px;
border-radius:8px;
margin-bottom:15px;
}

.info-edicao{
background:#fff3cd;
border:1px solid #ffeeba;
padding:12px;
border-radius:8px;
margin-bottom:15px;
display:none;
}

</style>
</head>

<body>

<div class="topo">
Reação Transfusional
<a href="dashboard.html">Voltar</a>
</div>

<div class="container">

<div class="card">

<h3>Nova reação</h3>

<div class="info-agencia">
Agência do usuário logado: <strong id="agenciaLogada">Carregando...</strong>
</div>

<div id="infoEdicao" class="info-edicao">
Editando reação.
</div>

<label>Paciente *</label>
<input id="paciente">

<label>Prontuário</label>
<input id="prontuario">

<label>Data da reação *</label>
<input type="date" id="data">

<label>Tipo de reação *</label>
<select id="tipo">
<option value="">Selecione</option>
<option>Febril não hemolítica</option>
<option>Alérgica</option>
<option>Anafilática</option>
<option>Hemolítica</option>
<option>TRALI</option>
<option>Sobrecarga circulatória</option>
<option>Outra</option>
</select>

<label>Classificação</label>
<select id="classificacao">
<option value="">Selecione</option>
<option>Leve</option>
<option>Moderada</option>
<option>Grave</option>
</select>

<label>Conduta</label>
<textarea id="conduta"></textarea>

<label>Desfecho</label>
<textarea id="desfecho"></textarea>

<label>Observações</label>
<textarea id="obs"></textarea>

<button id="btnSalvar">Salvar reação</button>
<button id="btnCancelar" class="secundario" style="display:none;">Cancelar edição</button>

</div>

<div class="card">

<h3>Reações da sua agência</h3>

<table>

<thead>
<tr>
<th>Data</th>
<th>Agência</th>
<th>Paciente</th>
<th>Tipo</th>
<th>Classificação</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabaseUrl = "https://awtszrqsnsgncdrlzizy.supabase.co"
const supabaseKey = "sb_publishable_z32nrrXomlRC-Ke4wVqZJA_o7FikqDb"

const supabase = createClient(supabaseUrl, supabaseKey)

let agenciaUsuario=""
let editandoId=null

async function carregarUsuario(){

const {data}=await supabase.auth.getSession()

const email=data.session.user.email

const {data:usuario}=await supabase
.from("usuarios")
.select("*")
.eq("email",email)
.single()

agenciaUsuario=usuario.agencia

document.getElementById("agenciaLogada").innerText=agenciaUsuario

}

async function carregar(){

const {data}=await supabase
.from("reacoes_transfusionais")
.select("*")
.eq("agencia",agenciaUsuario)
.order("created_at",{ascending:false})

const lista=document.getElementById("lista")
lista.innerHTML=""

data.forEach(r=>{

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${r.data_reacao ?? ""}</td>
<td>${r.agencia ?? ""}</td>
<td>${r.paciente ?? ""}</td>
<td>${r.tipo_reacao ?? ""}</td>
<td>${r.classificacao ?? ""}</td>
<td>
<button onclick="editar('${r.id}')">Editar</button>
<button class="excluir" onclick="excluir('${r.id}')">Excluir</button>
</td>
`

lista.appendChild(tr)

})

}

window.editar=async(id)=>{

const {data}=await supabase
.from("reacoes_transfusionais")
.select("*")
.eq("id",id)
.single()

editandoId=id

document.getElementById("paciente").value=data.paciente
document.getElementById("prontuario").value=data.prontuario
document.getElementById("data").value=data.data_reacao
document.getElementById("tipo").value=data.tipo_reacao
document.getElementById("classificacao").value=data.classificacao
document.getElementById("conduta").value=data.conduta
document.getElementById("desfecho").value=data.desfecho
document.getElementById("obs").value=data.observacoes

document.getElementById("infoEdicao").style.display="block"
document.getElementById("btnCancelar").style.display="inline-block"

}

window.excluir=async(id)=>{

if(!confirm("Excluir reação?")) return

await supabase
.from("reacoes_transfusionais")
.delete()
.eq("id",id)

carregar()

}

document.getElementById("btnCancelar").onclick=()=>{

editandoId=null

document.getElementById("infoEdicao").style.display="none"
document.getElementById("btnCancelar").style.display="none"

}

document.getElementById("btnSalvar").onclick=async()=>{

const paciente=document.getElementById("paciente").value
const prontuario=document.getElementById("prontuario").value
const data=document.getElementById("data").value
const tipo=document.getElementById("tipo").value
const classificacao=document.getElementById("classificacao").value
const conduta=document.getElementById("conduta").value
const desfecho=document.getElementById("desfecho").value
const obs=document.getElementById("obs").value

const payload={
agencia:agenciaUsuario,
paciente,
prontuario,
data_reacao:data,
tipo_reacao:tipo,
classificacao,
conduta,
desfecho,
observacoes:obs
}

if(editandoId){

await supabase
.from("reacoes_transfusionais")
.update(payload)
.eq("id",editandoId)

editandoId=null

}else{

await supabase
.from("reacoes_transfusionais")
.insert([payload])

}

carregar()

}

await carregarUsuario()
carregar()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Agências</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

.topo{
background:#b30000;
color:white;
padding:20px;
font-size:22px;
display:flex;
justify-content:space-between;
}

.topo a{
color:white;
text-decoration:none;
background:#d91c1c;
padding:10px 15px;
border-radius:6px;
}

.container{
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
margin-bottom:30px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
background:#c40000;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin-right:5px;
}

button.excluir{
background:#8b0000;
}

button.editar{
background:#ff9800;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border-bottom:1px solid #ddd;
padding:10px;
text-align:left;
}

.bloqueado{
max-width:700px;
margin:40px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.08);
text-align:center;
}
</style>

</head>

<body>

<div class="topo">
Gestão de Agências
<a href="dashboard.html">Voltar</a>
</div>

<div class="container" id="conteudo" style="display:none;">

<div class="card">

<h3>Criar / Editar agência</h3>

<input id="nome" placeholder="Nome da agência">

<input id="gestor" placeholder="Nome do gestor responsável">

<button onclick="salvar()">Salvar</button>

</div>

<div class="card">

<h3>Agências cadastradas</h3>

<table>

<thead>
<tr>
<th>Nome</th>
<th>Gestor</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

</div>

<div id="bloqueado" class="bloqueado" style="display:none;">
<h2>Acesso restrito</h2>
<p>Somente administradores podem acessar esta página.</p>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabaseUrl="https://awtszrqsnsgncdrlzizy.supabase.co"
const supabaseKey="sb_publishable_z32nrrXomlRC-Ke4wVqZJA_o7FikqDb"

const supabase=createClient(supabaseUrl,supabaseKey)

let editandoId=null

async function validarADM(){

const { data: sessao } = await supabase.auth.getSession()

if(!sessao.session){
window.location.href="/"
return false
}

const email=sessao.session.user.email

const { data: usuario } = await supabase
.from("usuarios")
.select("*")
.eq("email",email)
.single()

if(!usuario || usuario.perfil!=="ADM"){
document.getElementById("bloqueado").style.display="block"
return false
}

document.getElementById("conteudo").style.display="block"
return true
}

window.salvar=async()=>{

const nome=document.getElementById("nome").value
const gestor=document.getElementById("gestor").value

if(editandoId){

await supabase
.from("agencias")
.update({
nome_agencia:nome,
gestor
})
.eq("id",editandoId)

editandoId=null

}else{

await supabase
.from("agencias")
.insert([{
nome_agencia:nome,
gestor
}])

}

document.getElementById("nome").value=""
document.getElementById("gestor").value=""

carregar()

}

window.editar=async(id)=>{

const {data}=await supabase
.from("agencias")
.select("*")
.eq("id",id)
.single()

document.getElementById("nome").value=data.nome_agencia
document.getElementById("gestor").value=data.gestor

editandoId=id

}

window.excluir=async(id)=>{

if(!confirm("Deseja excluir esta agência?")) return

await supabase
.from("agencias")
.delete()
.eq("id",id)

carregar()

}

async function carregar(){

const {data}=await supabase
.from("agencias")
.select("*")

const lista=document.getElementById("lista")
lista.innerHTML=""

data.forEach(a=>{

lista.innerHTML+=`
<tr>
<td>${a.nome_agencia}</td>
<td>${a.gestor || "-"}</td>
<td>
<button class="editar" onclick="editar('${a.id}')">Editar</button>
<button class="excluir" onclick="excluir('${a.id}')">Excluir</button>
</td>
</tr>
`

})

}

const ok=await validarADM()
if(ok){
carregar()
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Indicadores Hemoterápicos</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f4f4;
}

.topo{
background:#b30000;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

.topo a{
color:white;
text-decoration:none;
background:#d91c1c;
padding:10px 15px;
border-radius:6px;
}

.container{
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.numero{
font-size:40px;
font-weight:bold;
color:#b30000;
margin-top:10px;
}

.analise{
text-align:left;
line-height:1.6;
font-size:16px;
}

</style>

</head>

<body>

<div class="topo">
Indicadores Hemoterápicos
<a href="dashboard.html">Voltar</a>
</div>

<div class="container">

<div class="grid">

<div class="card">
<h3>Total de transfusões</h3>
<div class="numero" id="totalTransfusoes">0</div>
</div>

<div class="card">
<h3>Total de reações</h3>
<div class="numero" id="totalReacoes">0</div>
</div>

<div class="card">
<h3>Taxa de reação</h3>
<div class="numero" id="taxaReacao">0%</div>
</div>

<div class="card">
<h3>Concentrado de hemácias</h3>
<div class="numero" id="ch">0</div>
</div>

<div class="card">
<h3>Plaquetas</h3>
<div class="numero" id="plaq">0</div>
</div>

<div class="card">
<h3>Plasma</h3>
<div class="numero" id="plasma">0</div>
</div>

</div>

<div class="card analise">

<h3>Análise automática dos indicadores</h3>

<p id="analiseIndicadores">

Carregando análise...

</p>

</div>

</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabaseUrl = "https://awtszrqsnsgncdrlzizy.supabase.co"
const supabaseKey = "sb_publishable_z32nrrXomlRC-Ke4wVqZJA_o7FikqDb"

const supabase = createClient(supabaseUrl, supabaseKey)

async function carregarIndicadores(){

const { data:transfusoes } = await supabase
.from("transfusoes")
.select("*")

const { data:reacoes } = await supabase
.from("reacoes_transfusionais")
.select("*")

const totalTransfusoes = transfusoes.length
const totalReacoes = reacoes.length

document.getElementById("totalTransfusoes").innerText = totalTransfusoes
document.getElementById("totalReacoes").innerText = totalReacoes

let taxa = 0

if(totalTransfusoes > 0){
taxa = ((totalReacoes / totalTransfusoes) * 100).toFixed(2)
}

document.getElementById("taxaReacao").innerText = taxa + "%"

let ch = transfusoes.filter(t => t.hemocomponente === "Concentrado de hemácias").length
let plaq = transfusoes.filter(t => t.hemocomponente === "Plaquetas").length
let plasma = transfusoes.filter(t => t.hemocomponente === "Plasma").length

document.getElementById("ch").innerText = ch
document.getElementById("plaq").innerText = plaq
document.getElementById("plasma").innerText = plasma

let texto = ""

texto += "No período analisado foram registradas " + totalTransfusoes + " transfusões. "

texto += "Foram identificadas " + totalReacoes + " reações transfusionais, "

texto += "representando taxa de " + taxa + "%. "

if(ch > plaq && ch > plasma){

texto += "A maior parte das transfusões foi de concentrado de hemácias."

}

if(plaq > ch && plaq > plasma){

texto += "A maior parte das transfusões foi de plaquetas."

}

if(plasma > ch && plasma > plaq){

texto += "A maior parte das transfusões foi de plasma."

}

document.getElementById("analiseIndicadores").innerText = texto

}

carregarIndicadores()

</script>

</body>

</html>

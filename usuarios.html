<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Usuários</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

.topo{
background:#b30000;
color:white;
padding:20px;
font-size:22px;
display:flex;
justify-content:space-between;
}

.topo a{
color:white;
text-decoration:none;
background:#d91c1c;
padding:10px 15px;
border-radius:6px;
}

.container{
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
margin-bottom:30px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#c40000;
color:white;
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border-bottom:1px solid #ddd;
padding:10px;
text-align:left;
}

</style>

</head>

<body>

<div class="topo">
Usuários
<a href="dashboard.html">Voltar</a>
</div>

<div class="container">

<div class="card">

<h3>Criar usuário</h3>

<input id="nome" placeholder="Nome">

<input id="email" placeholder="Email">

<select id="perfil">
<option>ADM</option>
<option>Gestor</option>
<option>Colaborador</option>
</select>

<select id="agencia">
<option>Guarulhos</option>
<option>IBCC</option>
</select>

<button onclick="criar()">Criar usuário</button>

</div>

<div class="card">

<h3>Usuários cadastrados</h3>

<table>

<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th>Perfil</th>
<th>Agência</th>
</tr>
</thead>

<tbody id="lista"></tbody>

</table>

</div>

</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabaseUrl="https://awtszrqsnsgncdrlzizy.supabase.co"
const supabaseKey="sb_publishable_z32nrrXomlRC-Ke4wVqZJA_o7FikqDb"

const supabase=createClient(supabaseUrl,supabaseKey)

window.criar=async()=>{

const nome=document.getElementById("nome").value
const email=document.getElementById("email").value
const perfil=document.getElementById("perfil").value
const agencia=document.getElementById("agencia").value

await supabase
.from("usuarios")
.insert([{nome,email,perfil,agencia}])

carregar()

}

async function carregar(){

const {data}=await supabase
.from("usuarios")
.select("*")

const lista=document.getElementById("lista")

lista.innerHTML=""

data.forEach(u=>{

lista.innerHTML+=`
<tr>
<td>${u.nome}</td>
<td>${u.email}</td>
<td>${u.perfil}</td>
<td>${u.agencia}</td>
</tr>
`

})

}

carregar()

</script>

</body>

</html>
